<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Digital Wallet - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body class="bg-light">
    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card p-4 shadow-sm" style="width: 400px;">
            <h3 class="text-center mb-4">Wallet Login</h3>
            <div id="alert" class="alert alert-danger d-none"></div>
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label">Email address</label>
                    <input type="email" id="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Sign In</button>
            </form>
            <p class="mt-3 text-center">Don't have an account? <a href="/register">Register here</a></p>
        </div>
    </div>
    <script>
        $(document).ready(function() {
            $("#loginForm").submit(function(e) {
                e.preventDefault();
                $.ajax({
                    url: '/auth/login',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({ email: $("#email").val(), password: $("#password").val() }),
                    success: function(res) {
                        // 🌟 FIXED: Changed key from 'token' to 'access_token' to match the dashboard setup!
                        localStorage.setItem('access_token', res.access_token);
                        window.location.href = '/dashboard';
                    },
                    error: function(xhr) {
                        $("#alert").removeClass('d-none').text(xhr.responseJSON?.detail || "Login failed");
                    }
                });
            });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Digital Wallet - Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body class="bg-light">
    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card p-4 shadow-sm" style="width: 400px;">
            <h3 class="text-center mb-4">Register Account</h3>
            <div id="alert" class="alert alert-success d-none"></div>
            <div id="error-alert" class="alert alert-danger d-none"></div>
            <form id="registerForm">
                <div class="mb-3">
                    <label class="form-label">Email address</label>
                    <input type="email" id="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-success w-100">Sign Up</button>
            </form>
            <p class="mt-3 text-center">Already have an account? <a href="/">Login</a></p>
        </div>
    </div>
    <script>
        $(document).ready(function() {
            $("#registerForm").submit(function(e) {
                e.preventDefault();
                $.ajax({
                    url: '/auth/register',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({ email: $("#email").val(), password: $("#password").val() }),
                    success: function() {
                        $("#error-alert").addClass('d-none');
                        $("#alert").removeClass('d-none').text("Registration Successful! Redirecting...");
                        setTimeout(() => { window.location.href = '/'; }, 2000);
                    },
                    error: function(xhr) {
                        $("#alert").addClass('d-none');
                        $("#error-alert").removeClass('d-none').text(xhr.responseJSON.detail || "Registration failed");
                    }
                });
            });
        });
    </script>
</body>
</html>
